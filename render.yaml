services:
  - type: web
    name: imoradar
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss --skip-generate && NODE_OPTIONS='--max-old-space-size=400' npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: GOBII_API_KEY
        sync: false
